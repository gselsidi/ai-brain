      - seo
      - organic search
      - keyword
      - content
      - copywriting
      - landing page
      - conversion
      - funnel
      - lead gen
      - campaign
      - social
      - email
    required_framework_agents:
      - product_context_analyst
      - delivery_planner
      - interface_contract_architect
      - quality_explorer
      - docs_drift_guard
      - requirements_auditor
    default_specialists:
      - marketing_strategist
      - content_copywriter
      - analytics_measurement_specialist
    specialists:
      - name: seo_specialist
        trigger_terms: [seo, organic search, serp, keyword, metadata, schema, rankings]
      - name: content_copywriter
        trigger_terms: [copywriting, copy, content, blog, headline, messaging]
      - name: conversion_rate_optimizer
        trigger_terms: [conversion, cta, landing page, a/b, cro]
      - name: analytics_measurement_specialist
        trigger_terms: [analytics, tracking, attribution, ga4, search console, measurement]
      - name: funnel_lead_gen_strategist
        trigger_terms: [funnel, lead gen, lead magnet, offer, sales page]
      - name: paid_media_strategist
        trigger_terms: [ads, ppc, paid media, google ads, meta ads, cac, roas]
      - name: social_media_strategist
        trigger_terms: [social, linkedin, twitter, tiktok, instagram, reddit]
      - name: brand_messaging_guardian
        trigger_terms: [brand, positioning, voice, narrative]
    expansion_sets:
      - name: seo_growth
        trigger_terms: [seo, organic search, serp, keyword, metadata, schema, rankings]
        specialists:
          - seo_specialist
          - content_copywriter
          - analytics_measurement_specialist
          - conversion_rate_optimizer
          - funnel_lead_gen_strategist
        reason: >
          SEO usually touches search intent, content quality, measurement, and
          conversion path, but only the first few needed specialists should be
          active by default.
    verification_gates:
      - prompt_spec
      - content_or_metadata_regression_when_changed
      - analytics_or_conversion_evidence_when_claimed
      - requirements_audit

  sales:
    description: Pipeline, offers, outreach, discovery, proposals, and revenue handoff.
    trigger_terms:
      - sales
      - funnel
      - outbound
      - discovery
      - proposal
      - pipeline
      - lead generation
      - lead gen
      - offer
      - crm
    required_framework_agents:
      - product_context_analyst
      - delivery_planner
      - interface_contract_architect
      - quality_explorer
      - requirements_auditor
    default_specialists:
      - sales_offer_strategist
      - funnel_lead_gen_strategist
      - sales_pipeline_analyst
    specialists:
      - name: sales_offer_strategist
        trigger_terms: [offer, package, guarantee, pricing, lead magnet]
      - name: outbound_strategist
        trigger_terms: [outbound, cold email, sequence, prospecting]
      - name: discovery_coach
        trigger_terms: [discovery, qualification, call, questions]
      - name: proposal_strategist
        trigger_terms: [proposal, rfp, quote, pitch]
      - name: sales_pipeline_analyst
        trigger_terms: [pipeline, forecast, crm, velocity]
    verification_gates:
