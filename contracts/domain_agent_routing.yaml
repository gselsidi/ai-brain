version: 1
name: division-first-prompt-routing
purpose: >
  Machine-readable routing contract for the main orchestrator. The orchestrator
  reads the user's prompt, selects the best-fit division, chooses core SDLC
  roles, and adds only the adjacent specialists justified by the prompt and
  evidence needs.

source_inspiration:
  repository: https://github.com/msitarzewski/agency-agents
  license: MIT
  usage_boundary: >
    Use the public agency roster as inspiration for division and specialist
    breadth. Do not vendor, copy, or require external agent prompt bodies;
    adopting teams may map these specialist lenses to their own runtime-specific
    agents.

routing_defaults:
  strategy: division_first_token_thrifty
  max_primary_specialists: 3
  max_adjacent_specialists: 2
  max_adjacent_divisions: 1
  baseline_framework_agents:
    - sdlc_orchestrator
    - product_context_analyst
    - delivery_planner
    - requirements_auditor
  required_prompt_spec_fields:
    - primary_division
    - adjacent_divisions
    - selected_framework_agents
    - selected_specialists
    - deferred_specialists
    - routing_assumptions
    - verification_gates
  escalation_rule: >
    Start with the smallest useful set. Add adjacent specialists only when the
    prompt names their concern, the source artifacts expose that concern, or a
    failed gate proves the extra lens is needed.

divisions:
  engineering:
    description: Programming, software delivery, architecture, code changes, and developer workflow.
    trigger_terms:
      - programming
      - coding
      - software
      - implement
      - bug
      - fix
      - refactor
      - frontend
      - backend
      - api
      - database
      - test
      - tests
      - ci
      - deploy
    required_framework_agents:
      - interface_contract_architect
      - dev_builder
      - dev_test_writer
      - quality_explorer
      - pr_reviewer
      - release_gate
    default_specialists:
      - software_architect
      - implementation_engineer
      - test_engineer
    specialists:
      - name: software_architect
        trigger_terms: [architecture, design, system, api, data model, integration]
      - name: frontend_developer
        trigger_terms: [frontend, react, vue, angular, ui, css, component]
      - name: backend_engineer
        trigger_terms: [backend, api, backend service, database, migration, queue]
      - name: devops_automation_engineer
        trigger_terms: [ci, cd, deploy, docker, kubernetes, workflow, pipeline]
      - name: test_engineer
        trigger_terms: [test, regression, unit, integration, e2e, coverage]
      - name: performance_optimizer
        trigger_terms: [performance, slow, latency, memory, core web vitals]
      - name: security_reviewer
        trigger_terms: [security, auth, permission, secrets, vulnerability]
      - name: technical_writer
        trigger_terms: [docs, documentation, readme, guide]
    verification_gates:
      - prompt_spec
      - framework_or_target_tests
      - framework_or_target_lint
      - pr_review
      - release_gate

  marketing:
    description: Growth, content, SEO, positioning, channel strategy, and conversion paths.
    trigger_terms:
