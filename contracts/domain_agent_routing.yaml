      - test_execution
      - evidence_judge
      - release_gate

  support:
    description: Customer support, operations, runbooks, incident response, and knowledge base work.
    trigger_terms:
      - support
      - incident
      - runbook
      - help center
      - knowledge base
      - escalation
      - ticket
    required_framework_agents:
      - product_context_analyst
      - docs_drift_guard
      - quality_explorer
      - requirements_auditor
    default_specialists:
      - support_ops_specialist
      - technical_writer
      - incident_response_lead
    specialists:
      - name: support_ops_specialist
        trigger_terms: [support, ticket, escalation, help center]
      - name: technical_writer
        trigger_terms: [runbook, knowledge base, docs, guide]
      - name: incident_response_lead
        trigger_terms: [incident, outage, postmortem, on-call]
    verification_gates:
      - docs_drift_check
      - quality_exploration
      - requirements_audit

orchestrator_rules:
  - Read the prompt before assigning work and extract lifecycle phase, artifact
    changes, division signals, adjacent disciplines, and evidence gates.
  - Select one primary division by default. Add at most the configured adjacent
    divisions unless the prompt explicitly requires more.
  - Prefer explicit specialist mentions over inferred expansion sets.
  - Record selected and deferred specialists in the prompt spec so the team can
    escalate without rediscovering the context.
  - Do not spawn or claim specialists that are unsupported by the runtime,
    prompt scope, or token budget.
  - Keep routing product-agnostic; the target repo supplies product surfaces,
    credentials, analytics data, and domain-specific commands.
