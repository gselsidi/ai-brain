    default_specialists:
      - ui_designer
      - ux_researcher
      - accessibility_reviewer
    specialists:
      - name: ui_designer
        trigger_terms: [ui, visual, layout, component, mockup]
      - name: ux_researcher
        trigger_terms: [ux, user flow, ux research, user research, usability]
      - name: brand_guardian
