    trigger_terms:
      - product
      - roadmap
      - requirements
      - user story
      - adoption
      - metric
      - experiment
      - mvp
    required_framework_agents:
      - product_context_analyst
      - delivery_planner
      - interface_contract_architect
      - requirements_auditor
    default_specialists:
      - product_strategist
      - requirements_analyst
      - analytics_measurement_specialist
    specialists:
      - name: product_strategist
        trigger_terms: [strategy, roadmap, mvp, prioritization]
      - name: requirements_analyst
        trigger_terms: [requirements, user story, acceptance criteria, scope]
      - name: analytics_measurement_specialist
        trigger_terms: [metric, experiment, kpi, adoption analytics, product analytics]
    verification_gates:
      - prompt_spec
      - interface_contract
      - requirements_audit

  security:
    description: Security review, privacy, dependencies, permissions, auth, and abuse risk.
    trigger_terms:
      - security
      - vulnerability
      - auth
      - permission
      - privacy
      - secret
      - compliance
      - threat
    required_framework_agents:
      - security_reviewer
      - adversarial_reviewer
      - dev_test_writer
      - requirements_auditor
      - release_gate
    default_specialists:
      - security_reviewer
      - threat_modeler
      - dependency_auditor
    specialists:
      - name: threat_modeler
        trigger_terms: [threat, abuse, risk, attack]
      - name: dependency_auditor
        trigger_terms: [dependency, package, supply chain, vulnerability]
      - name: privacy_reviewer
        trigger_terms: [privacy, pii, personal data, data retention]
    verification_gates:
      - security_review
      - adversarial_review
      - regression
      - release_gate

  testing:
    description: Test strategy, regression, QA exploration, fixtures, and release confidence.
    trigger_terms:
      - test
      - tests
      - qa
      - regression
      - fixture
      - coverage
      - flaky
      - failing check
    required_framework_agents:
      - dev_test_writer
      - quality_explorer
      - self_healer
      - evidence_judge
      - release_gate
    default_specialists:
      - test_engineer
      - quality_explorer
      - evidence_judge
    specialists:
      - name: test_engineer
        trigger_terms: [unit, integration, e2e, regression, fixture, test, tests]
      - name: quality_explorer
