  growth-tooling:
    divisions:
    - marketing
    - sales
    - product
    - design
    merge_into: interactive_growth_tool_lens
    default_action: add_catalog_lens
    skills:
    - slug: calculator-design
      summary: Designing interactive calculators that deliver decision-support value while qualifying
        leads. Distinguishes vanity-calculator (no real value) from lead-trap (hides answer behind email)
        from transparent-decision-tool (gives genuine value, captures leads honestly)
      integration_action: add_catalog_lens
    - slug: chatbot-flow-design
      summary: Designing conversational flows for chatbots and AI agents on websites. Distinguishes scripted-bot
        (rigid trees, fail edge cases) from hallucinating-bot (LLM without structure, makes things up)
        from structured-guided-conversation (LLM-powered with intent architecture and fallback discipline)
      integration_action: add_catalog_lens
    - slug: comparison-tool-design
      summary: Designing comparison tools that help users decide. Distinguishes feature-list-dump (every
        feature in a row, no decision support) from hidden-recommendation (biased comparison pretending
        to be neutral) from honest-comparison-with-guidance (genuine comparison plus opinionated recommendation)
      integration_action: add_catalog_lens
    - slug: funnel-flow-architecture
      summary: Architecting cross-tool conversion flows that match audience and stage. Distinguishes silo-funnels
        (every tool standalone) from kitchen-sink-funnels (every audience squeezed through one path) from
        matched-funnels (architecture matched to audience-and-stage)
      integration_action: add_catalog_lens
    - slug: interactive-product-tour
      summary: Designing in-product tours and contextual help. Distinguishes tooltip-spam (every button
        has a tour stop) from one-and-done (tour shows once, never seen again) from contextual-when-needed
        (surfaces help at the moment friction occurs)
      integration_action: add_catalog_lens
    - slug: lead-magnet-design
      summary: Designing gated content that earns the email. Distinguishes thin-bait (overpromises, underdelivers)
        from kitchen-sink-resource (everything, helps with nothing) from earned-value-magnet (delivers
        standalone value while qualifying the lead)
      integration_action: add_catalog_lens
    - slug: multi-step-form-design
      summary: Designing multi-step forms that respect cognitive load while maintaining completion intent.
        Distinguishes kitchen-sink-single-page (overwhelms) from progress-theater (steps without genuine
        staging) from genuinely-staged (each step earns its own page)
      integration_action: add_catalog_lens
    - slug: onboarding-wizard-design
      summary: Designing first-run product onboarding wizards. Distinguishes tutorial-overload (dump everything
        upfront) from skip-friendly-empty (skipped onboarding leads to abandoned product) from earned-progressive-disclosure
        (right things at the right moments)
      integration_action: add_catalog_lens
    - slug: product-configurator-design
      summary: Designing interactive product configurators. Distinguishes infinite-options (decision paralysis
        from too many options) from canned-bundles-only (no real customization) from guided-configuration
        (smart defaults plus meaningful constraints plus escape hatches)
      integration_action: add_catalog_lens
    - slug: quiz-and-assessment-design
      summary: Designing quizzes and assessments that produce actionable segmentation. Distinguishes clickbait-quiz
        (engagement only) from vanity-result (entertaining, not useful) from actionable-segmentation (genuine
        categorization that drives next-step recommendations)
      integration_action: add_catalog_lens
    - slug: scheduler-and-booking-design
      summary: Designing schedulers and booking flows. Distinguishes any-time-friction (no qualification,
        just a booking link) from interrogation-gate (so much qualification it scares users off) from
        qualified-fast-path (just enough qualification to set up the call well)
      integration_action: add_catalog_lens
    - slug: upgrade-flow-design
      summary: Designing free-to-paid conversion flows. Distinguishes paywall-everywhere (gates everything
        aggressively) from free-forever-trap (no upgrade path surfaces) from value-triggered-upgrade (paywall
        surfaces at moments of demonstrated value)
      integration_action: add_catalog_lens
