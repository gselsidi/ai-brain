version: 1
name: rampstack-skill-integration
purpose: Map RampStack Claude Skills into AI Brain lifecycle skills, routing divisions, and optional source-catalog
  lenses without vendoring upstream skill bodies.
source:
  repository: https://github.com/rampstackco/claude-skills
  inspected_commit: c0b6ba8004ec12985d0a336197b1800adfb5a9dd
  license: MIT
  inspected_skill_count: 103
  catalog_claim: 103 skills in the rendered GitHub README; raw README may lag at 102.
  integration_mode: metadata_mapping_only_no_skill_body_copy
routing_policy:
  default: merge into existing AI Brain lifecycle skills when the lifecycle role already exists; otherwise
    expose as a new optional catalog lens.
  token_budget: Select only a few source skills per prompt and defer plausible extras.
  tool_boundary: tool_dependent_lens skills require adopting-team MCPs, credentials, or data before execution.
category_mappings:
  brand:
    divisions:
    - design
    - marketing
    merge_into: brand_and_design_lens
    default_action: add_catalog_lens
    skills:
    - slug: brand-archetype-system
      summary: '12 archetype defaults across 18 verticals: color, type, voice, imagery starters'
      integration_action: add_catalog_lens
    - slug: brand-ideation
      summary: Naming, positioning territories, mood directions, narrative angles
      integration_action: add_catalog_lens
    - slug: brand-identity
      summary: Logo system, color, typography, imagery, iconography, motion
      integration_action: add_catalog_lens
    - slug: brand-style-guide
      summary: The canonical reference document for the full brand system
      integration_action: add_catalog_lens
    - slug: brand-voice
      summary: Voice attributes, tone shifts, vocabulary, paired-example library
      integration_action: add_catalog_lens
    - slug: creative-brief-selector
      summary: Live-reference-grounded creative briefs with divergence check against prior builds
      integration_action: add_catalog_lens
    - slug: logo-design
      summary: Logo variants across architectures (wordmark, lockup, monogram, letterform-as-symbol),
        with rationale and application specs
      integration_action: add_catalog_lens
  content:
    divisions:
    - marketing
    merge_into: marketing_content_lens
    default_action: add_catalog_lens
    skills:
    - slug: ai-content-collaboration
      summary: 'How humans and AI compose in content workflows: participation boundaries, hybrid patterns,
        voice ownership, the AI slop problem, disclosure and transparency, team calibration, and the ethics
        of honest AI-assisted production'
      integration_action: add_catalog_lens
    - slug: content-and-copy
      summary: Website copy, blog content, content production frameworks
      integration_action: add_catalog_lens
    - slug: content-brief-authoring
      summary: 'Per-piece editorial brief: target keyword, intent, audience, outline, entity coverage,
        internal linking, success criteria, and the discipline that distinguishes useful briefs from bloat'
      integration_action: add_catalog_lens
    - slug: content-distribution
      summary: 'Content distribution discipline: owned, earned, and paid channels matched to audience
        and content type. Channel-fit decisions, distribution cadence, the strategic alternative to spam-everywhere
        or hope-and-pray'
      integration_action: add_catalog_lens
    - slug: content-refresh-system
      summary: 'Systematic content refresh: quarterly audits, refresh prioritization, refresh-vs-merge-vs-delete
        decisions, the lifecycle discipline that distinguishes intentional programs from set-and-forget
        decay'
      integration_action: add_catalog_lens
    - slug: content-repurposing
      summary: 'Cross-format content adaptation: one piece becomes many (blog series, email, social, webinar,
        podcast, video) with per-format adaptation rather than mass-blast that ignores medium constraints'
      integration_action: add_catalog_lens
    - slug: editorial-qa
      summary: 'Pre-publish QA framework: brief adherence, voice consistency, fact accuracy, AI-content
        audit, AEO/SEO compliance, sampling at scale, and the workflow that distinguishes catch-problems
        QA from process theater'
      integration_action: add_catalog_lens
    - slug: email-sequences
      summary: Onboarding flows, lifecycle campaigns, transactional copy
      integration_action: add_catalog_lens
    - slug: evidence-based-reviews
      summary: Evidence tiers, methodology disclosure, honest review claims
      integration_action: add_catalog_lens
    - slug: landing-page-copy
      summary: Landing pages, sales pages, hero-to-CTA flow
      integration_action: add_catalog_lens
    - slug: long-form-content-frameworks
      summary: Structural patterns for individual long-form pieces (case studies, whitepapers, research
        reports, definitive guides, manifestos, ebooks, long-form tutorials) that distinguish publication-quality
        work from bloggy-long padding or academic bloat
      integration_action: add_catalog_lens
    - slug: pillar-content-architecture
      summary: 'Hub-level content architecture: pillar topic selection, cluster planning, internal linking,
        URL structure, pillar and cluster page anatomy, topical authority signals, refresh discipline'
      integration_action: add_catalog_lens
    - slug: programmatic-seo
      summary: 'Designing pSEO programs that work: data sources, template design, quality control at scale,
        internal linking, crawl budget, AEO/GEO patterns, refresh discipline, and when pSEO is and is
        not the right answer'
      integration_action: add_catalog_lens
