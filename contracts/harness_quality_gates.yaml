version: 2
summary: >
  Second-order gates for the reusable autonomous SDLC team framework. These
  checks keep role prompts, memory, docs, reports, and release evidence aligned
  without relying on any built-in product runtime.
minimum_test_count: 12
required_test_sections:
  - Agent Skills Framework Tests
  - Harness Quality Tests
  - Memory And State Tests
  - Report Rendering Tests
  - Target Repo Workflow Tests
  - Team Framework Tests
  - Team Reliability Tests
required_test_node_fragments:
  - tests/test_agentic_framework_map.py::test_combined_agentic_framework_map_is_complete
  - tests/test_harness_quality_contract.py::test_harness_quality_contract_references_existing_artifacts_and_markers
  - tests/test_combined_report_html.py::test_render_report_combines_team_framework_reports
  - tests/test_team_framework.py::test_team_framework_contract_lists_existing_role_files
  - tests/test_team_framework.py::test_prompt_spec_template_and_current_spec_are_actionable
  - tests/test_team_framework.py::test_goal_command_is_a_define_phase_before_local_specs
  - tests/test_team_framework.py::test_provider_native_goal_adapter_feeds_required_sdlc_loop
  - tests/test_team_framework.py::test_prompt_to_agent_routing_is_division_first_and_token_thrifty
  - tests/test_team_framework.py::test_rampstack_skill_catalog_maps_all_source_skills_and_router_defers_extra_lenses
  - tests/test_team_framework.py::test_marketing_skill_catalog_maps_all_source_skills_and_routes_trigger_terms
  - tests/test_improvement_queue.py::test_improvement_queue_detects_and_prioritizes_blockers
  - tests/test_conversation_feedback.py::test_conversation_feedback_filters_to_project_and_suggests_patches
  - tests/test_conversation_feedback.py::test_conversation_feedback_respects_cadence
  - tests/test_repo_init.py::test_repo_init_detects_product_commands_and_writes_local_files
  - tests/test_repo_init.py::test_public_docs_point_to_init_instead_of_manual_template_copying
  - tests/test_repo_init.py::test_root_agents_bridge_installs_and_preserves_existing_instructions
  - tests/test_repo_init.py::test_root_agents_bridge_replaces_only_managed_block
  - tests/test_dropin_export.py::test_dropin_export_excludes_git_and_local_artifacts
  - tests/test_dropin_export.py::test_manual_copy_clean_removes_nested_git_only_inside_parent_repo
  - tests/test_python_bootstrap.py::test_makefile_prefers_existing_venv_and_checks_python_before_init
  - tests/test_python_bootstrap.py::test_readme_top_guidance_mentions_python_bootstrap_before_overview
  - tests/test_target_repo_workflow.py::test_target_commands_run_detected_repo_commands
  - tests/test_target_repo_workflow.py::test_target_commands_fail_when_profile_has_no_runnable_commands
  - tests/test_target_repo_workflow.py::test_repo_work_spec_updates_state_and_target_drift
  - tests/test_target_repo_workflow.py::test_release_gate_fails_when_target_commands_fail
  - tests/test_team_framework.py::test_framework_drift_validator_passes_for_current_contract
  - tests/test_memory_state.py::test_memory_and_state_templates_describe_generic_team_framework
  - tests/test_memory_state.py::test_release_gate_accepts_state_template_without_local_state
  - tests/test_memory_state.py::test_release_gate_accepts_initialized_repo_profile_state
  - tests/test_memory_state.py::test_tracked_source_does_not_publish_workspace_identifiers
  - tests/test_team_reliability.py::test_team_reliability_scores_healthy_evidence_without_penalty
  - tests/test_team_reliability.py::test_team_reliability_credits_regressions_caught_by_tests
required_artifacts:
  - AGENTS.md
  - START_HERE_WITH_CODEX.md
  - README.md
  - .gitignore
  - Makefile
  - contracts/expected_behavior.md
  - contracts/team_framework.yaml
  - contracts/agentic_framework_map.yaml
  - contracts/domain_agent_routing.yaml
  - contracts/marketing_skill_integration.yaml
  - contracts/rampstack_skill_integration.yaml
  - specs/prompt_spec_template.md
  - memory/PROJECT_MEMORY.template.md
  - state/sdlc_state.template.json
  - docs/how_this_was_built.md
  - state/reports/improvement-queue_report.json
  - tools/check_python.py
  - tools/install_root_agents.py
  - tools/run_tests_with_report.py
  - tools/check_implementation_drift.py
  - tools/validate_harness_quality.py
  - tools/generate_combined_report_html.py
  - tools/run_improvement_queue.py
  - tools/analyze_conversation_feedback.py
  - tools/clean_manual_copy.py
  - tools/export_dropin_bundle.py
  - tools/init_repo_profile.py
  - tools/manage_repo_work_spec.py
  - tools/run_target_commands.py
  - tools/check_target_drift.py
  - tools/select_agent_route.py
  - tools/score_team_reliability.py
  - tools/run_release_gate.py
  - tests/test_agentic_framework_map.py
  - tests/test_combined_report_html.py
  - tests/test_harness_quality_contract.py
  - tests/test_memory_state.py
  - tests/test_improvement_queue.py
  - tests/test_conversation_feedback.py
  - tests/test_dropin_export.py
  - tests/test_python_bootstrap.py
  - tests/test_target_repo_workflow.py
  - tests/test_team_framework.py
  - tests/test_team_reliability.py
required_reports:
  test_report:
    path: state/reports/test_report.json
    require_status: PASS
    require_source_for_each_test: true
  combined_report:
    path: state/reports/combined_report.html
    markers:
      - Autonomous SDLC Team Report
      - Regression Test Evidence
      - Team Reliability
      - Framework Drift
      - Target Repo Commands
      - Target Repo Drift
      - Improvement Queue
      - source-code
      - tests/test_team_framework.py::test_team_framework_contract_lists_existing_role_files
