version: 1
name: marketing-skill-integration
purpose: Map Corey Haines' Marketing Skills catalog into AI Brain marketing, sales, product,
  and growth routing lenses without vendoring upstream skill bodies.
source:
  repository: https://github.com/coreyhaines31/marketingskills
  inspected_commit: 4b377f289bd37be457a7154626e109ec3affad50
  license: MIT
  inspected_skill_count: 44
  catalog_claim: 44 skills found under skills/*/SKILL.md at the inspected commit.
  integration_mode: metadata_mapping_only_no_skill_body_copy
supplemental_sources:
  - name: direct-response-copy
    source_type: gist
    url: https://gist.github.com/boringmarketer/96192770df22ac2a9ff4aed72b4c20f4
    author: boringmarketer
    file: direct-response-copy-gist.md
    inspected_at: "2026-06-14"
    license: unspecified
    integration_mode: metadata_mapping_only_no_skill_body_copy
    usage_boundary: >
      Use as an attributed routing lens for direct-response copy prompts. Do
      not vendor or copy the gist body unless a compatible license or explicit
      permission is available.
supplemental_skill_count: 1
total_mapped_skill_count: 45
routing_policy:
  default: Merge into existing AI Brain or RampStack lanes when a close equivalent exists;
    otherwise expose as a focused marketing source-catalog lens.
  token_budget: Select only the highest-signal marketing skills per prompt and defer plausible extras.
  duplicate_boundary: Duplicate slugs across source catalogs represent the same concept and should not
    activate twice.
  tool_boundary: tool_dependent_lens skills require adopting-team accounts, URLs, analytics/ad data,
    CRM data, market data, or web research before execution.
  foundation: product-marketing is a useful marketing context lens, but it should not be loaded
    automatically unless the prompt needs positioning, ICP, audience, or product context.
category_mappings:
  marketing-foundation:
    divisions:
      - marketing
      - product
    merge_into: product_marketing_context_lens
    default_action: add_catalog_lens
    skills:
